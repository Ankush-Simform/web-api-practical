<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simform Project Manager</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
      integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <link rel="icon" href="images/favicon.webp" />
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body>
    <nav class="navbar navbar-light text-white">
      <div class="container-fluid">
        <a class="navbar-brand text-white ms-2 ms-md-5">Simform</a>
        <div class="d-flex">
          <input
            id="searchInput"
            class="form-control me-2"
            type="search"
            placeholder="Search..."
          />
          <button class="btn btn-success text-white me-2 me-md-5" type="button">
            Search
          </button>
        </div>
      </div>
    </nav>

    <div id="head" class="container">
      <h3>SIMFORM PROJECT MANAGEMENT SYSTEM</h3>
    </div>

    <div
      id="formContainer"
      class="container mt-4 p-4 border rounded bg-light"
      style="display: none"
    >
      <div class="row g-3">
        <div class="col-12 col-md-3">
          <input
            type="text"
            id="prodName"
            class="form-control"
            placeholder="Member Name"
          />
        </div>
        <div class="col-12 col-md-2">
          <input
            type="number"
            id="prodPrice"
            class="form-control"
            placeholder="Product-Price"
          />
        </div>
        <div class="col-12 col-md-4">
          <input
            type="text"
            id="prodDesc"
            class="form-control"
            placeholder="Role/Description"
          />
        </div>
        <div class="col-12 col-md-3">
          <input
            type="file"
            id="prodImage"
            class="form-control"
            accept="image/*"
          />
        </div>
        <div class="col-12 text-end">
          <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
          <button class="btn btn-success" onclick="saveProduct()" id="saveBtn">
            Submit & Add
          </button>
        </div>
      </div>
    </div>

    <div class="container-fluid px-2 px-md-5 mt-4">
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead class="table-dark">
            <tr>
              <th>Image</th>
              <th>Product</th>
              <th>Price</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
    <div class="imagePreview" style="display: none">
      <img src="" alt="image" id="imagePreview" />
    </div>
    <div class="container pb-5">
      <div
        class="d-flex flex-column flex-md-row justify-content-center align-items-center gap-3 mt-3"
      >
        <button class="btn btn-primary px-4" id="openFormBtn">
          Get Product
        </button>
        <button class="btn btn-primary px-4" id="post">POST</button>
        <button class="btn btn-primary px-4" id="put">PUT</button>
        <button class="btn btn-primary px-4" id="patch">PATCH</button>
        <button class="btn btn-primary px-4" id="delete">DELETE</button>
      </div>
    </div>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
      integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <script src="js/main.js" type="module" defer></script>
  </body>
</html>
